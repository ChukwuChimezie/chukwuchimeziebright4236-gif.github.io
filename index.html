<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FC0P9XK86"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Political Blog</title>
    <style>
        body { font-family: -apple-system, sans-serif; line-height: 1.6; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .post-preview { margin-bottom: 30px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .post-preview h2 a { color: #0066cc; text-decoration: none; }
        .post-preview h2 a:hover { text-decoration: underline; }
        .date { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>My Political Takes</h1>
    <div id="featured-posts">Loading latest commentary...</div>

    <script>
        // Fetch our JSON file containing the blog posts
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                const container = document.getElementById('featured-posts');
                container.innerHTML = ''; // Clear loading text

                // Loop through posts and build the HTML structure
                posts.forEach(post => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post-preview';
                    postElement.innerHTML = `
                        <h2><a href="post.html?id=${post.id}">${post.title}</a></h2>
                        <div class="date">${post.date}</div>
                        <p>${post.summary}</p>
                    `;
                    container.appendChild(postElement);
                });
            })
            .catch(err => console.error("Error loading posts:", err));
    </script>
</body>
</html>
